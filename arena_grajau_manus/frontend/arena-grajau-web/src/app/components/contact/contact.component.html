<section id="contato" class="section-padding">
  <div class="container">
    <div class="text-center mb-5" data-aos="fade-up">
      <h2 class="display-5 fw-bold">Entre em Contato</h2>
      <p class="text-muted">Tire suas dúvidas ou agende uma aula experimental.</p>
    </div>
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="row g-0">
            <div class="col-md-5 bg-black p-5 text-white">
              <h4 class="fw-bold mb-4">Informações</h4>
              <div class="d-flex mb-4">
                <i class="bi bi-geo-alt-fill text-primary-custom fs-4 me-3"></i>
                <p class="mb-0">Grajaú, São Paulo - SP<br>Arena Grajaú</p>
              </div>
              <div class="d-flex mb-4">
                <i class="bi bi-telephone-fill text-primary-custom fs-4 me-3"></i>
                <p class="mb-0">(11) 99999-9999</p>
              </div>
              <div class="d-flex mb-4">
                <i class="bi bi-envelope-fill text-primary-custom fs-4 me-3"></i>
                <p class="mb-0">contato&#64;arenagrajau.com.br</p>
              </div>
              <div class="mt-5">
                <a href="#" class="text-white me-3 fs-4"><i class="bi bi-instagram"></i></a>
                <a href="#" class="text-white me-3 fs-4"><i class="bi bi-facebook"></i></a>
                <a href="https://wa.me/5511999999999" class="text-white fs-4"><i class="bi bi-whatsapp"></i></a>
              </div>
            </div>
            <div class="col-md-7 p-5">
              <form (submit)="onSubmit($event)">
                <div class="mb-3">
                  <label class="form-label fw-semibold">Nome Completo</label>
                  <input type="text" class="form-control p-3 border-0 bg-light" placeholder="Seu nome" required name="name">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">E-mail</label>
                  <input type="email" class="form-control p-3 border-0 bg-light" placeholder="seu@email.com" required name="email">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">Mensagem</label>
                  <textarea class="form-control p-3 border-0 bg-light" rows="4" placeholder="Como podemos ajudar?" required name="message"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 mt-3 fw-bold">Enviar Mensagem</button>
              </form>
              <div *ngIf="submitted" class="alert alert-success mt-4 animate__animated animate__fadeIn">
                Obrigado! Sua mensagem foi enviada com sucesso.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
