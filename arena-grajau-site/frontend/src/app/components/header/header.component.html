<header class="header" [class.header--solid]="rolado">
  <div class="header__inner">
    <a href="#inicio" class="header__brand" (click)="fecharMenu()">
      <span class="header__crest">AG</span>
      <span class="header__brand-text">
        <strong>Arena Grajaú</strong>
        <small>Escolinha Brigadeiro Faria Lima · Desde 1976</small>
      </span>
    </a>

    <nav class="header__nav" [class.header__nav--aberto]="menuAberto">
      <a
        *ngFor="let link of links"
        [href]="link.href"
        (click)="fecharMenu()"
      >{{ link.label }}</a>

      <a class="header__cta" [href]="whatsappLink" target="_blank" rel="noopener noreferrer" (click)="fecharMenu()">
        Fale no WhatsApp
      </a>
    </nav>

    <button
      class="header__burger"
      [class.header__burger--aberto]="menuAberto"
      (click)="alternarMenu()"
      [attr.aria-expanded]="menuAberto"
      aria-label="Abrir menu"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
